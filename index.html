<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">

  <title>طلب المنتجات</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --card: #22263a;
      --accent: #25D366;
      --accent2: #128C7E;
      --text: #f0f2ff;
      --muted: #8892b0;
      --border: #2e3450;
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Top bar */
    .topbar {
      background: var(--surface);
      padding: 14px 20px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 4px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .store-name {
      font-size: 22px;
      font-weight: 900;
      color: var(--text);
    }

    .store-badge {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 20px;
    }

    .topbar-sub {
      font-size: 12px;
      color: var(--muted);
    }


    /* Search bar */
    .search-wrap {
      background: var(--surface);
      padding: 10px 14px 14px;
      border-bottom: 1px solid var(--border);
    }

    .search-input {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 10px 16px 10px 40px;
      color: var(--text);
      font-family: 'Cairo', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      direction: rtl;
    }

    .search-input:focus {
      border-color: var(--accent);
    }

    .search-input::placeholder {
      color: var(--muted);
    }

    .search-wrap-inner {
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      fill: var(--muted);
      pointer-events: none;
    }

    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      color: var(--muted);
      font-size: 15px;
      padding: 40px 0;
    }

    /* Product list */
    .product-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      align-content: start;
      scrollbar-width: none;
    }

    .product-list::-webkit-scrollbar {
      display: none;
    }

    /* Product Card */
    .product-card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color 0.2s;
      position: relative;
    }

    .product-card.has-qty {
      border-color: rgba(37, 211, 102, 0.4);
    }

    /* Image */
    .product-img-wrap {
      width: 100%;
      height: 180px;
      overflow: hidden;
      background: #ffffff;
      flex-shrink: 0;
    }

    .product-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      display: block;
    }

    .img-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 54px;
      background: linear-gradient(135deg, #1e2135, #252a3d);
    }

    /* Info */
    .product-info {
      padding: 12px 14px 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .product-name {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.4;
      text-align: right;
    }

    /* Quantity row */
    .qty-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .qty-btn {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 22px;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s ease, opacity 0.2s;
      -webkit-tap-highlight-color: transparent;
      line-height: 1;
      flex-shrink: 0;
    }

    .qty-btn.minus {
      background: #e05c7a;
      color: #fff;
    }

    .qty-btn.minus:disabled {
      opacity: 0.3;
      cursor: default;
    }

    .qty-btn.minus:active {
      transform: scale(0.88);
    }

    .qty-btn.plus {
      background: #25D366;
      color: #fff;
    }

    .qty-btn.plus:active {
      transform: scale(0.88);
    }

    .qty-display {
      font-size: 20px;
      font-weight: 900;
      color: var(--text);
      min-width: 32px;
      text-align: center;
    }

    /* Selected dot */
    .selected-dot {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 10px;
      height: 10px;
      background: var(--accent);
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.2s;
      box-shadow: 0 0 8px var(--accent);
      z-index: 2;
    }

    .product-card.has-qty .selected-dot {
      opacity: 1;
    }

    /* Floating send button popup */
    .send-popup {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      width: calc(100% - 32px);
      max-width: 480px;
      z-index: 100;
      opacity: 0;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.25s ease;
      pointer-events: none;
    }

    .send-popup.visible {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
      pointer-events: all;
    }

    .send-popup-inner {
      background: linear-gradient(135deg, #1a2e24, #1a2b28);
      border: 1px solid rgba(37, 211, 102, 0.3);
      border-radius: 20px;
      padding: 12px 16px 12px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(37, 211, 102, 0.15);
    }

    .send-popup-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
      text-align: right;
    }

    .send-popup-count {
      font-size: 13px;
      color: var(--muted);
    }

    .send-popup-count span {
      color: var(--accent);
      font-weight: 700;
    }

    .send-popup-total {
      font-size: 12px;
      color: var(--muted);
    }

    .send-popup-total span {
      color: var(--text);
      font-weight: 600;
    }

      font-weight: 900;

      display: flex;
      align-items: center;
      justify-content: center;

      transition: transform 0.12s ease;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 6px 20px rgba(37, 211, 102, 0.4);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .send-btn:active {

    }

    .send-btn svg {

    /* Toast */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1e2435;
      color: var(--text);
      padding: 12px 24px;
      border-radius: 30px;
      font-family: 'Cairo', sans-serif;
      font-size: 14px;
      font-weight: 600;
      border: 1px solid var(--border);
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 999;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>

        if (!card) return;
        const match = p.name.toLowerCase().includes(query) || query === "";
        card.style.display = match ? "" : "none";
        if (match) visible++;
      });
      const noRes = document.getElementById("noResults");
      if (noRes) noRes.style.display = visible === 0 ? "" : "none";
    }

    function renderProducts() {
      const list = document.getElementById("productList");
      list.innerHTML = '<div class="no-results" id="noResults" style="display:none">لا توجد نتائج</div>';
      PRODUCTS.forEach(p => {
        const qty = quantities[p.id];
        const card = document.createElement("div");
        card.className = "product-card" + (qty > 0 ? " has-qty" : "");
        card.id = "card-" + p.id;
        card.innerHTML =
          '<div class="selected-dot"></div>' +
          '<div class="product-img-wrap">' +
          '<img src="' + p.img + '" alt="' + p.name + '" onerror="imgErr(this)">' +
          '</div>' +
          '<div class="product-info">' +
          '<div class="product-name">' + p.name + '</div>' +
          '<div class="qty-row">' +
          '<button class="qty-btn minus" onclick="changeQty(' + p.id + ',-1)" id="minus-' + p.id + '"' + (qty <= 0 ? ' disabled' : '') + '>−</button>' +
          '<span class="qty-display" id="qty-' + p.id + '">' + qty + '</span>' +
          '<button class="qty-btn plus" onclick="changeQty(' + p.id + ',1)" id="plus-' + p.id + '">+</button>' +
          '</div>' +
          '</div>';
        list.appendChild(card);
      });
      updateSummary();
    }

    function changeQty(id, delta) {
      const current = quantities[id];
      const next = Math.max(0, current + delta);
      if (next === current) return;
      quantities[id] = next;
      document.getElementById("qty-" + id).textContent = next;
      document.getElementById("minus-" + id).disabled = next <= 0;
      document.getElementById("card-" + id).className = "product-card" + (next > 0 ? " has-qty" : "");
      updateSummary();
    }

    function updateSummary() {
      const selected = PRODUCTS.filter(p => quantities[p.id] > 0).length;
      const total = PRODUCTS.reduce((sum, p) => sum + quantities[p.id], 0);
      document.getElementById("selectedCount").textContent = selected;
      document.getElementById("totalQty").textContent = total;
      const popup = document.getElementById("sendPopup");
      if (selected > 0) {
        popup.classList.add("visible");
      } else {
        popup.classList.remove("visible");
      }
    }

    function toArabicNumerals(n) {
      return String(n).replace(/\d/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);
    }

    function getArabicDay(day) {
      const days = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
      return days[day];
    }

    function sendToWhatsApp() {
      const selected = PRODUCTS.filter(p => quantities[p.id] > 0);
      if (selected.length === 0) return;

      const now = new Date();
      const yyyy = toArabicNumerals(now.getFullYear());
      const mm   = toArabicNumerals(String(now.getMonth() + 1).padStart(2, '0'));
      const dd   = toArabicNumerals(String(now.getDate()).padStart(2, '0'));
      const hh   = toArabicNumerals(String(now.getHours()).padStart(2, '0'));
      const min  = toArabicNumerals(String(now.getMinutes()).padStart(2, '0'));
      const dayName = getArabicDay(now.getDay());

      const divider = '─────────────────';

      const lines = [];
      lines.push('🛒 نقوصات البار');
      lines.push('');
      lines.push('المنتج             العدد');
      lines.push(divider);

      selected.forEach(p => {
        const qty = toArabicNumerals(quantities[p.id]);
        const name = p.name;
        const spaces = ' '.repeat(Math.max(1, 20 - name.length));
        lines.push(name + spaces + qty);
      });

      lines.push(divider);
      lines.push('');
      lines.push('📅 التاريخ: ' + yyyy + '/' + mm + '/' + dd + ' ' + dayName);
      lines.push('🕐 الوقت: ' + hh + ':' + min);

      const url = "https://wa.me/" + WHATSAPP_NUMBER + "?text=" + encodeURIComponent(lines.join("\n"));
      showToast("⏩ جاري فتح واتساب...");
      setTimeout(() => window.open(url, "_blank"), 500);
    }

    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 2500);
    }

    renderProducts();
  </script>
</body>

</html>
